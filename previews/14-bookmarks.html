<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方案十四：Bookmarks · 收藏夹</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0f;color:#e4e4ec;min-height:100vh;line-height:1.7;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -20%,rgba(163,230,53,0.04),transparent);pointer-events:none;z-index:0;}
.preview-badge{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.04);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.06);padding:8px 24px;border-radius:20px;font-size:11px;letter-spacing:0.6px;color:rgba(255,255,255,0.3);z-index:100;font-weight:400;}

.navbar{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,10,15,0.75);backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,0.04);padding:0 32px;height:64px;display:flex;align-items:center;}
.nav-inner{max-width:1000px;width:100%;margin:0 auto;display:flex;align-items:center;}
.nav-brand{font-size:16px;font-weight:600;background:linear-gradient(135deg,#e4e4ec,#a3e635);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.nav-links{margin-left:auto;display:flex;align-items:center;gap:6px;}
.nav-user{display:flex;align-items:center;gap:10px;padding:4px 16px 4px 4px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.04);border-radius:12px;font-size:13px;font-weight:500;}
.nav-user .avatar{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#a3e635,#65a30d);color:#0a0a0f;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}

.page{max-width:1000px;margin:84px auto 0;padding:0 32px 100px;position:relative;z-index:1;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;padding-top:20px;}
.page-header h1{font-size:24px;font-weight:700;}
.btn-outline{padding:10px 22px;border-radius:12px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:rgba(255,255,255,0.5);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;}
.btn-outline:hover{border-color:rgba(163,230,53,0.08);color:#a3e635;}

/* ===== Collection List ===== */
.collections{display:flex;flex-direction:column;gap:12px;}
.collection-card{background:linear-gradient(135deg,rgba(23,23,23,0.9),rgba(41,37,36,0.85));border:1px solid rgba(255,255,255,0.04);border-radius:16px;padding:20px 24px;cursor:pointer;transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);}
.collection-card:hover{transform:translateY(-2px);border-color:rgba(163,230,53,0.06);box-shadow:0 12px 32px rgba(0,0,0,0.2);}
.collection-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.collection-name{font-size:16px;font-weight:600;display:flex;align-items:center;gap:10px;}
.collection-count{font-size:13px;color:rgba(255,255,255,0.35);}
.collection-desc{font-size:13px;color:rgba(255,255,255,0.3);margin-bottom:12px;}
.collection-preview{display:flex;gap:8px;}
.preview-item{width:48px;height:48px;border-radius:10px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:center;font-size:20px;}

/* ===== Items in Collection ===== */
.items-list{display:flex;flex-direction:column;gap:1px;background:rgba(255,255,255,0.02);border-radius:12px;overflow:hidden;margin-top:16px;}
.item-row{display:flex;align-items:center;gap:14px;padding:14px 18px;background:rgba(0,0,0,0.15);cursor:pointer;transition:background 0.2s;}
.item-row:hover{background:rgba(163,230,53,0.03);}
.item-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;background:rgba(163,230,53,0.04);flex-shrink:0;}
.item-info{flex:1;min-width:0;}
.item-title{font-size:14px;font-weight:500;}
.item-meta{font-size:12px;color:rgba(255,255,255,0.25);margin-top:2px;}
.item-action{background:none;border:none;color:rgba(255,255,255,0.2);font-size:16px;cursor:pointer;padding:4px 8px;border-radius:6px;transition:all 0.2s;}
.item-action:hover{background:rgba(239,68,68,0.1);color:#ef4444;}

/* ===== Empty ===== */
.empty{text-align:center;padding:80px 20px;}
.empty-icon{font-size:56px;margin-bottom:16px;opacity:0.3;}
.empty-text{font-size:15px;color:rgba(255,255,255,0.2);}
</style>
</head>
<body>
<div class="preview-badge">✦ 收藏夹</div>
<nav class="navbar"><div class="nav-inner"><div class="nav-brand">Portfolio</div><div class="nav-links"><span class="nav-user"><span class="avatar">A</span><span>admin</span></span></div></div></nav>

<div class="page">
  <div class="page-header">
    <h1>📖 收藏夹</h1>
    <button class="btn-outline">+ 新建收藏集</button>
  </div>

  <div class="collections">
    <div class="collection-card">
      <div class="collection-header">
        <span class="collection-name">📂 设计灵感</span>
        <span class="collection-count">5 个项目</span>
      </div>
      <div class="collection-desc">收集优秀的UI/UX设计作品和灵感参考</div>
      <div class="collection-preview">
        <span class="preview-item">🎨</span>
        <span class="preview-item">⚛️</span>
        <span class="preview-item">📊</span>
        <span class="preview-item">+2</span>
      </div>
      <div class="items-list">
        <div class="item-row">
          <span class="item-icon">🎨</span>
          <div class="item-info"><div class="item-title">品牌视觉识别系统设计</div><div class="item-meta">admin · 2026.05.15</div></div>
          <button class="item-action">×</button>
        </div>
        <div class="item-row">
          <span class="item-icon">⚛️</span>
          <div class="item-info"><div class="item-title">React 组件库设计</div><div class="item-meta">admin · 2026.05.14</div></div>
          <button class="item-action">×</button>
        </div>
        <div class="item-row">
          <span class="item-icon">📊</span>
          <div class="item-info"><div class="item-title">实时数据仪表盘</div><div class="item-meta">admin · 2026.05.13</div></div>
          <button class="item-action">×</button>
        </div>
      </div>
    </div>

    <div class="collection-card">
      <div class="collection-header">
        <span class="collection-name">📄 技术文章</span>
        <span class="collection-count">3 个项目</span>
      </div>
      <div class="collection-desc">前端开发相关的好文和教程收藏</div>
      <div class="collection-preview">
        <span class="preview-item">🗄️</span>
        <span class="preview-item">📱</span>
        <span class="preview-item">🎨</span>
      </div>
      <div class="items-list">
        <div class="item-row">
          <span class="item-icon">🗄️</span>
          <div class="item-info"><div class="item-title">Node.js 后端架构设计</div><div class="item-meta">admin · 2026.05.11</div></div>
          <button class="item-action">×</button>
        </div>
        <div class="item-row">
          <span class="item-icon">📱</span>
          <div class="item-info"><div class="item-title">移动端适配方案讨论</div><div class="item-meta">admin · 2026.05.12</div></div>
          <button class="item-action">×</button>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
