<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · 像素粒子画像</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0a0a0f;color:#e4e4ec;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans SC',sans-serif;
  height:100vh;overflow:hidden;user-select:none
}
canvas{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:1}

/* 进场遮罩 */
#overlay{
  position:fixed;inset:0;z-index:100;background:#0a0a0f;
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  transition:opacity .8s ease
}
#overlay.hidden{opacity:0;pointer-events:none}
.ot{
  font-size:48px;font-weight:700;letter-spacing:6px;
  background:linear-gradient(135deg,#a3e635,#65a30d,#a3e635);
  background-size:200% 200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  opacity:0;transform:translateY(30px)scale(.95);
  animation:ti 1.2s ease forwards,sh 2s ease-in-out infinite 1.2s
}
@keyframes ti{0%{opacity:0;transform:translateY(30px)scale(.95)}100%{opacity:1;transform:translateY(0)scale(1)}}
@keyframes sh{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.os{margin-top:12px;font-size:14px;color:rgba(255,255,255,.3);letter-spacing:2px;opacity:0;animation:fu .8s ease forwards .6s}
@keyframes fu{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}

/* 登录框 — 右侧 */
#loginWrap{
  position:fixed;z-index:10;top:50%;left:50%;
  width:100%;max-width:400px;padding:0 20px;
  opacity:0;transform:translate(-50%,-50%);
  transition:opacity .6s ease,transform 1.4s cubic-bezier(.22,1,.36,1)
}
#loginWrap.visible{
  opacity:1;
  transform:translate(calc(50vw - 480px),-50%);
}
.card{
  background:linear-gradient(135deg,rgba(23,23,23,.95),rgba(41,37,36,.9));
  border:1px solid rgba(255,255,255,.06);border-radius:24px;
  padding:36px 32px;backdrop-filter:blur(20px);box-shadow:0 25px 60px rgba(0,0,0,.5)
}
.tabs{display:flex;gap:16px;margin-bottom:24px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,.06)}
.tab{
  font-size:16px;font-weight:600;color:rgba(255,255,255,.3);
  cursor:pointer;transition:color .3s;
  background:none;border:none;font-family:inherit;padding:0
}
.tab.active{color:#a3e635}
.fg{margin-bottom:16px}
.fl{display:block;font-size:11px;font-weight:600;color:rgba(255,255,255,.4);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.fi{
  width:100%;padding:13px 16px;
  border:1px solid rgba(255,255,255,.06);border-radius:12px;
  background:rgba(0,0,0,.3);color:#e4e4ec;font-size:14px;
  font-family:inherit;outline:none;transition:border-color .3s
}
.fi:focus{border-color:rgba(163,230,53,.2)}
.btn{
  width:100%;padding:13px;border:none;border-radius:12px;
  background:linear-gradient(135deg,#a3e635,#65a30d);color:#0a0a0f;
  font-size:14px;font-weight:700;cursor:pointer;transition:opacity .3s;font-family:inherit;margin-top:4px
}
.btn:hover{opacity:.9}
#label{
  position:fixed;z-index:10;bottom:28px;left:50%;
  transform:translateX(-50%);font-size:11px;color:rgba(255,255,255,.12);
  letter-spacing:1px;opacity:0;transition:opacity .8s ease;pointer-events:none;text-align:center
}
#label.visible{opacity:1}
</style>
</head>
<body>

<div id="overlay">
  <div class="ot">REASONIX</div>
  <div class="os">✦ 像素粒子构建中 ✦</div>
</div>

<canvas id="c"></canvas>

<div id="loginWrap">
  <div class="card">
    <div class="tabs">
      <button class="tab active">登录</button>
      <button class="tab">注册</button>
    </div>
    <div class="fg"><div class="fl">用户名</div><input class="fi" placeholder="输入用户名..."></div>
    <div class="fg"><div class="fl">密码</div><input class="fi" type="password" placeholder="输入密码..."></div>
    <button class="btn">✦ 进入系统</button>
  </div>
</div>

<div id="label">◈ 鼠标靠近粒子（20px）使其散开 ◈</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ===== 像素图 (40×50) =====
const MAP = [
  '....XXXXXXXXXXXXXXXXXXXXXXXXXXXXXX....',
  '..XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX..',
  '.XXXXXXXXXX............XXXXXXXXXXXXX.',
  'XXXXXXXXX..................XXXXXXXXX',
  'XXXXXXXX....................XXXXXXXX',
  'XXXXXXX......................XXXXXXX',
  'XXXXXX........................XXXXXX',
  'XXXXXX........................XXXXXX',
  'XXXXX..........................XXXXX',
  'XXXXX..........................XXXXX',
  'XXXXXX...................XXXX..XXXXX',
  'XXXXXX...........XXXXX..XXXXXX.XXXXX',
  'XXXXXXX.....XXXXXXXXXXXXXXX...XXXXXX',
  'XXXXXXXX..XXXXXXXXXXXXXXXX..XXXXXXXX',
  'XXXXXXXXX.XXXXXXXXXXXXXXX.XXXXXXXXXX',
  '....XXXXXXXXXXXXXXXXXXXXXXXXX.......',
  '....XXXX..XXXXXXXXXXXXX..XXXX.......',
  '...XXXX....XXXXXXXXX....XXXXX......',
  '...XXXX....XXXXXXXXX....XXXXX......',
  '..XXXXX....XXXXXXXXX....XXXXX.....',
  '..XXXXX....XXXXXXXXX....XXXXX.....',
  '..XXXXX....XXXXXXXXX....XXXXX.....',
  '..XXXXX....XXXXXXXXX....XXXXX.....',
  '...XXXX....XXXXXXXXX....XXXXX......',
  '...XXXX....XXXXXXXXX....XXXXX......',
  '....XXXX..XXXXXXXXXXX..XXXX.......',
  '....XXXXXXXXXXXXXXXXXXXXXXXXX......',
  '.....XXXXXXXXXXXXXXXXXXXXXXX.......',
  '......XXXXXXXXXXXXXXXXXXXXX........',
  '.......XXXXXXXXXXXXXXXXXXX.........',
  '........XXXXXXXXXXXXXXXXX..........',
  '.........XXXXXXXXXXXXXXX...........',
  '..........XXXXXXXXXXXXX............',
  '...........XXXXXXXXXXX............',
  '............XXXXXXXXX.............',
  '.............XXXXXXXXX............',
  '..............XXXXXXX.............',
  '...............XXXXX..............',
  '................XXX...............',
  '.................X................',
  '...............................',
  '...............................',
  '...............................',
  '...............................',
  '...............................',
  '...............................',
  '...............................',
  '...............................',
  '...............................',
  '...............................',
];

const PS = 7;     // pixel size
const COLS = 40;
const ROWS = 50;

function buildParticles(cx, cy) {
  const arr = [];
  const ox = cx - COLS * PS / 2;
  const oy = cy - ROWS * PS / 2;
  for (let r = 0; r < ROWS && r < MAP.length; r++) {
    for (let c = 0; c < COLS && c < MAP[r].length; c++) {
      if (MAP[r][c] === 'X') {
        const px = ox + c * PS + PS / 2;
        const py = oy + r * PS + PS / 2;
        arr.push({
          x: px, y: py,
          ox: px, oy: py,  // 弹簧目标位置
          vx: 0, vy: 0,
          s: PS * 0.85,
          col: `hsl(${90+Math.random()*30},${55+Math.random()*30}%,${35+Math.random()*30}%)`
        });
      }
    }
  }
  return arr;
}

// 初始居中
let centerX = W / 2;
let centerY = H / 2;
// 目标位置（左侧）
const TARGET_X_OFFSET = -140;
let targetCenterX = W / 2 + TARGET_X_OFFSET;
let targetCenterY = H / 2;

let pts = buildParticles(centerX, centerY);

// ===== 鼠标 =====
const mouse = { x: -9999, y: -9999, r: 20, on: false };
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = e.clientX - rect.left;
  mouse.y = e.clientY - rect.top;
  mouse.on = true;
});
canvas.addEventListener('mouseleave', () => { mouse.on = false; mouse.x = -9999; mouse.y = -9999; });

// ===== 物理 =====
const SPRING = 0.035;
const DAMP = 0.88;
const REPEL = 800;

function update() {
  for (const p of pts) {
    // 弹簧
    const dx = p.ox - p.x;
    const dy = p.oy - p.y;
    p.vx += dx * SPRING;
    p.vy += dy * SPRING;

    // 鼠标排斥
    if (mouse.on) {
      const mdx = p.x - mouse.x;
      const mdy = p.y - mouse.y;
      const dist = Math.sqrt(mdx * mdx + mdy * mdy);
      if (dist < mouse.r && dist > 0.1) {
        const f = (mouse.r - dist) / mouse.r * REPEL;
        p.vx += (mdx / dist) * f;
        p.vy += (mdy / dist) * f;
      }
    }

    p.vx *= DAMP;
    p.vy *= DAMP;
    p.x += p.vx;
    p.y += p.vy;

    // 边界
    const m = p.s / 2;
    if (p.x < m) p.x = m;
    if (p.x > W - m) p.x = W - m;
    if (p.y < m) p.y = m;
    if (p.y > H - m) p.y = H - m;
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // 微光
  const g = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.6);
  g.addColorStop(0, 'rgba(163,230,53,0.015)');
  g.addColorStop(1, 'rgba(10,10,15,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  for (const p of pts) {
    ctx.fillStyle = p.col;
    ctx.shadowColor = 'rgba(163,230,53,0.08)';
    ctx.shadowBlur = 3;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.s / 2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.shadowBlur = 0;
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

// ===== 粒子画像从中心移到左侧 =====
function migrateParticles() {
  const startX = W / 2;
  const endX = W / 2 + TARGET_X_OFFSET;
  const startTime = performance.now();
  const DUR = 1600; // 1.6s 平滑过渡

  return new Promise(resolve => {
    function step(now) {
      const t = Math.min((now - startTime) / DUR, 1);
      // ease-in-out-cubic
      const ease = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
      const cx = startX + (endX - startX) * ease;

      // 更新每个粒子的弹簧目标
      for (const p of pts) {
        const relX = p.ox - startX;
        p.ox = cx + relX;
        // y 不变
      }
      centerX = cx;

      if (t < 1) requestAnimationFrame(step);
      else resolve();
    }
    requestAnimationFrame(step);
  });
}

// ===== 启动 =====
setTimeout(() => {
  document.getElementById('overlay').classList.add('hidden');

  setTimeout(async () => {
    // 同时启动：表单显现 + 粒子画像移动
    document.getElementById('loginWrap').classList.add('visible');
    document.getElementById('label').classList.add('visible');

    // 粒子画像从中心移到左侧
    migrateParticles();

    // 粒子爆发效果
    let c = 0;
    const bi = setInterval(() => {
      if (c++ > 25) { clearInterval(bi); return; }
      for (const p of pts) {
        if (Math.random() < 0.05) {
          p.vx += (Math.random() - 0.5) * 10;
          p.vy += (Math.random() - 0.5) * 10;
        }
      }
    }, 35);
  }, 120);
}, 1200);

// 表单切换
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
  });
});

// resize
window.addEventListener('resize', () => {
  resize();
  // 重建粒子，保持偏移
  const offsetX = centerX - W / 2;
  const old = pts;
  centerX = W / 2 + offsetX;
  centerY = H / 2;
  pts = buildParticles(W / 2, H / 2);
  for (let i = 0; i < pts.length && i < old.length; i++) {
    pts[i].x = old[i].x;
    pts[i].y = old[i].y;
    pts[i].vx = old[i].vx;
    pts[i].vy = old[i].vy;
  }
  // 重新应用偏移
  for (const p of pts) {
    const relX = p.ox - W / 2;
    p.ox = centerX + relX;
  }
});
</script>
</body>
</html>
