<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录注册 · 像素粒子动画</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #0a0a0f;
  color: #e4e4ec;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
  height: 100vh;
  overflow: hidden;
  user-select: none;
}
canvas#particleCanvas {
  position: fixed;
  top: 0; left: 0;
  width: 100vw;
  height: 100vh;
  z-index: 1;
}

/* ===== 进场遮罩 ===== */
#introOverlay {
  position: fixed;
  inset: 0;
  z-index: 100;
  background: #0a0a0f;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  transition: opacity 0.8s ease;
}
#introOverlay.hidden {
  opacity: 0;
  pointer-events: none;
}
.intro-title {
  font-size: 48px;
  font-weight: 700;
  letter-spacing: 6px;
  background: linear-gradient(135deg, #a3e635, #65a30d, #a3e635);
  background-size: 200% 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  opacity: 0;
  transform: translateY(30px) scale(0.95);
  animation: titleIn 1.2s ease forwards, shimmer 2s ease-in-out infinite 1.2s;
}
@keyframes titleIn {
  0% { opacity: 0; transform: translateY(30px) scale(0.95); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes shimmer {
  0%, 100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}
.intro-sub {
  margin-top: 12px;
  font-size: 14px;
  color: rgba(255,255,255,0.3);
  letter-spacing: 2px;
  opacity: 0;
  animation: fadeUp 0.8s ease forwards 0.6s;
}
@keyframes fadeUp {
  0% { opacity: 0; transform: translateY(10px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* ===== 登录框（从中心移向左侧） ===== */
.auth-container {
  position: fixed;
  z-index: 10;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 100%;
  max-width: 420px;
  padding: 0 24px;
  opacity: 0;
  /* 动画由 JS 触发 */
}
.auth-container.visible {
  animation: formMoveLeft 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}
@keyframes formMoveLeft {
  0% {
    opacity: 0;
    transform: translate(-50%, -50%) translateX(0);
  }
  30% {
    opacity: 1;
    transform: translate(-50%, -50%) translateX(0);
  }
  100% {
    opacity: 1;
    transform: translate(-50%, -50%) translateX(calc(-50vw + 280px));
  }
}
.auth-card {
  background: linear-gradient(135deg, rgba(23,23,23,0.95), rgba(41,37,36,0.9));
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 24px;
  padding: 36px 32px;
  backdrop-filter: blur(20px);
  box-shadow: 0 25px 60px rgba(0,0,0,0.5);
}
.auth-tabs {
  display: flex;
  gap: 16px;
  margin-bottom: 24px;
  padding-bottom: 14px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.auth-tab {
  font-size: 16px;
  font-weight: 600;
  color: rgba(255,255,255,0.3);
  cursor: pointer;
  transition: color 0.3s;
  background: none; border: none; font-family: inherit; padding: 0;
}
.auth-tab.active { color: #a3e635; }
.auth-tab:hover:not(.active) { color: rgba(255,255,255,0.5); }

.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.4); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
.form-input {
  width: 100%; padding: 13px 16px;
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  background: rgba(0,0,0,0.3);
  color: #e4e4ec;
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.3s;
}
.form-input:focus { border-color: rgba(163,230,53,0.2); }

.btn-primary {
  width: 100%;
  padding: 13px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(135deg, #a3e635, #65a30d);
  color: #0a0a0f;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: opacity 0.3s;
  font-family: inherit;
  margin-top: 4px;
}
.btn-primary:hover { opacity: 0.9; }

/* ===== 标签 ===== */
#portraitLabel {
  position: fixed;
  z-index: 10;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  color: rgba(255,255,255,0.12);
  letter-spacing: 1px;
  opacity: 0;
  transition: opacity 0.8s ease;
  pointer-events: none;
  text-align: center;
}
#portraitLabel.visible { opacity: 1; }
</style>
</head>
<body>

<!-- 进场遮罩 -->
<div id="introOverlay">
  <div class="intro-title">REASONIX</div>
  <div class="intro-sub">✦ 像素粒子构建中 · 请稍候 ✦</div>
</div>

<canvas id="particleCanvas"></canvas>

<!-- 登录框 -->
<div class="auth-container" id="authContainer">
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active">登录</button>
      <button class="auth-tab">注册</button>
    </div>
    <div class="form-group">
      <label class="form-label">用户名</label>
      <input class="form-input" placeholder="输入用户名..." value="admin">
    </div>
    <div class="form-group">
      <label class="form-label">密码</label>
      <input class="form-input" type="password" placeholder="输入密码..." value="••••••••">
    </div>
    <button class="btn-primary">✦ 进入系统</button>
  </div>
</div>

<div id="portraitLabel">◈ 像素粒子 · 鼠标靠近 20px 范围内使粒子散开 ◈</div>

<script>
// =============================================================
//  像素粒子系统
// =============================================================
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ---------- 像素粒子画像 ----------
const PIXEL_SIZE = 7;
const PIXEL_COLS = 40;
const PIXEL_ROWS = 50;

const headMap = [
  '....XXXXXXXXXXXXXXXXXXXXXXXXXXXXXX....',
  '..XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX..',
  '.XXXXXXXXXX............XXXXXXXXXXXXX.',
  'XXXXXXXXX..................XXXXXXXXX',
  'XXXXXXXX....................XXXXXXXX',
  'XXXXXXX......................XXXXXXX',
  'XXXXXX........................XXXXXX',
  'XXXXXX........................XXXXXX',
  'XXXXX..........................XXXXX',
  'XXXXX..........................XXXXX',
  'XXXXXX...................XXXX..XXXXX',
  'XXXXXX...........XXXXX..XXXXXX.XXXXX',
  'XXXXXXX.....XXXXXXXXXXXXXXX...XXXXXX',
  'XXXXXXXX..XXXXXXXXXXXXXXXX..XXXXXXXX',
  'XXXXXXXXX.XXXXXXXXXXXXXXX.XXXXXXXXXX',
  '....XXXXXXXXXXXXXXXXXXXXXXXXX.......',
  '....XXXX..XXXXXXXXXXXXX..XXXX.......',
  '...XXXX....XXXXXXXXX....XXXXX......',
  '...XXXX....XXXXXXXXX....XXXXX......',
  '..XXXXX....XXXXXXXXX....XXXXX.....',
  '..XXXXX....XXXXXXXXX....XXXXX.....',
  '..XXXXX....XXXXXXXXX....XXXXX.....',
  '..XXXXX....XXXXXXXXX....XXXXX.....',
  '...XXXX....XXXXXXXXX....XXXXX......',
  '...XXXX....XXXXXXXXX....XXXXX......',
  '....XXXX..XXXXXXXXXXX..XXXX.......',
  '....XXXXXXXXXXXXXXXXXXXXXXXXX......',
  '.....XXXXXXXXXXXXXXXXXXXXXXX.......',
  '......XXXXXXXXXXXXXXXXXXXXX........',
  '.......XXXXXXXXXXXXXXXXXXX.........',
  '........XXXXXXXXXXXXXXXXX..........',
  '.........XXXXXXXXXXXXXXX...........',
  '..........XXXXXXXXXXXXX............',
  '...........XXXXXXXXXXX............',
  '............XXXXXXXXX.............',
  '.............XXXXXXXXX............',
  '..............XXXXXXX.............',
  '...............XXXXX..............',
  '................XXX...............',
  '.................X................',
  '...............................',
  '...............................',
  '...............................',
  '...............................',
  '...............................',
  '...............................',
  '...............................',
  '...............................',
  '...............................',
  '...............................',
];

function buildPortrait(cx, cy) {
  const particles = [];
  const pw = PIXEL_COLS * PIXEL_SIZE;
  const ph = PIXEL_ROWS * PIXEL_SIZE;
  const ox = cx - pw / 2;
  const oy = cy - ph / 2;

  for (let r = 0; r < PIXEL_ROWS && r < headMap.length; r++) {
    const row = headMap[r];
    for (let c = 0; c < PIXEL_COLS && c < row.length; c++) {
      if (row[c] === 'X') {
        const px = ox + c * PIXEL_SIZE + PIXEL_SIZE / 2;
        const py = oy + r * PIXEL_SIZE + PIXEL_SIZE / 2;
        particles.push({
          x: px, y: py,
          ox: px, oy: py,
          tx: px, ty: py,  // 目标最终位置
          vx: 0, vy: 0,
          size: PIXEL_SIZE * 0.85,
          color: `hsl(${90 + Math.random() * 30}, ${60 + Math.random() * 30}%, ${40 + Math.random() * 30}%)`,
        });
      }
    }
  }
  return particles;
}

// 粒子画先居中，后移到右侧
let portraitCenterX, portraitCenterY;
let portraitTargetX, portraitTargetY;
let portraitProgress = 0; // 0=居中, 1=在右侧
let moveStartTime = 0;
const MOVE_DURATION = 1500; // ms

function setPortraitTargets() {
  portraitCenterX = W / 2;
  portraitCenterY = H / 2;
  portraitTargetX = W - 140;
  portraitTargetY = H / 2;
}

let particles = [];

function initParticles() {
  setPortraitTargets();
  particles = buildPortrait(portraitCenterX, portraitCenterY);
  // 初始所有粒子 tx,ty 为目标位置
  for (const p of particles) {
    p.tx = p.ox;
    p.ty = p.oy;
  }
}
initParticles();

// 开始粒子画从中心移到右侧
function startPortraitMove() {
  moveStartTime = performance.now();
  // 重新计算目标位置
  for (const p of particles) {
    const dx = p.ox - portraitCenterX;
    const dy = p.oy - portraitCenterY;
    p.tx = portraitTargetX + dx;
    p.ty = portraitTargetY + dy;
  }
  portraitProgress = 0;
  requestAnimationFrame(animateMove);
}

function animateMove() {
  const elapsed = performance.now() - moveStartTime;
  const t = Math.min(elapsed / MOVE_DURATION, 1);
  // ease-out cubic
  const ease = 1 - Math.pow(1 - t, 3);
  portraitProgress = ease;

  let allDone = true;
  for (const p of particles) {
    if (t >= 1) {
      p.ox = p.tx;
      p.oy = p.ty;
    } else {
      const fromX = p.tx - (portraitTargetX - portraitCenterX);
      const fromY = p.ty - (portraitTargetY - portraitCenterY);
      p.ox = fromX + (p.tx - fromX) * ease;
      p.oy = fromY + (p.tx - fromY) * ease;  // BUG: should be ty - fromY
      // 修正:
      p.oy = fromY + (p.ty - fromY) * ease;
    }
    // 如果移动中粒子物理位置还没跟上，弹簧会拉过去
  }
  // 重新设置每个粒子的目标为当前插值位置
  for (const p of particles) {
    p.ox = portraitCenterX + (portraitTargetX - portraitCenterX) * ease + (p.x - portraitCenterX - (portraitTargetX - portraitCenterX) * ease) * 0;
    // 简化：直接把 ox,oy 设为插值
    const baseX = portraitCenterX + (portraitTargetX - portraitCenterX) * ease;
    const baseY = portraitCenterY + (portraitTargetY - portraitCenterY) * ease;
    const offsetX = (particles.indexOf(p) < 0 ? 0 : 0); // keep old
  }

  if (t < 1) {
    requestAnimationFrame(animateMove);
  }
}

// 更简洁的移动方式：每帧更新 ox,oy
let moveAnimId = null;
function movePortraitTo(targetX, targetY, duration) {
  const startX = portraitCenterX;
  const startY = portraitCenterY;
  const startTime = performance.now();

  function step(now) {
    const t = Math.min((now - startTime) / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    const cx = startX + (targetX - startX) * ease;
    const cy = startY + (targetY - startY) * ease;
    portraitCenterX = cx;
    portraitCenterY = cy;
    // 更新每个粒子的 ox,oy
    for (const p of particles) {
      const dx = p.x - (startX + (targetX - startX) * (1)); // keep
    }
    // 更简单：重建一次粒子位置
    if (t < 1) {
      moveAnimId = requestAnimationFrame(step);
    }
  }
  moveAnimId = requestAnimationFrame(step);
}

// ===== 更干净的移动实现 =====
// 直接每帧移动所有粒子的 ox,oy
function startSmoothMove() {
  const startX = W / 2;
  const endX = W - 140;
  const startTime = performance.now();
  const duration = 1400;

  function step(now) {
    const t = Math.min((now - startTime) / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    const currentCX = startX + (endX - startX) * ease;

    // 更新每个粒子的 ox,oy
    for (const p of particles) {
      // 粒子相对于中心的偏移
      const relX = p.ox - startX;
      // relY 不变
      const targetOX = currentCX + relX;
      // 直接设置 ox，弹簧会平滑追随
      p.ox = targetOX;
    }

    if (t < 1) {
      requestAnimationFrame(step);
    }
  }
  requestAnimationFrame(step);
}

// ---------- 鼠标交互 ----------
let mouse = { x: -9999, y: -9999, radius: 20 };
let mouseOnCanvas = false;

canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = e.clientX - rect.left;
  mouse.y = e.clientY - rect.top;
  mouseOnCanvas = true;
});
canvas.addEventListener('mouseleave', () => {
  mouseOnCanvas = false;
  mouse.x = -9999;
  mouse.y = -9999;
});

// ---------- 物理更新 ----------
const SPRING = 0.04;
const DAMP = 0.85;
const REPEL = 600;

function updateParticles() {
  for (const p of particles) {
    // 弹簧回复力 (拉向 ox,oy)
    const dx = p.ox - p.x;
    const dy = p.oy - p.y;
    p.vx += dx * SPRING;
    p.vy += dy * SPRING;

    // 鼠标排斥
    if (mouseOnCanvas) {
      const mdx = p.x - mouse.x;
      const mdy = p.y - mouse.y;
      const dist = Math.sqrt(mdx * mdx + mdy * mdy);
      if (dist < mouse.radius && dist > 0.1) {
        const force = (mouse.radius - dist) / mouse.radius * REPEL;
        const nx = mdx / dist;
        const ny = mdy / dist;
        p.vx += nx * force;
        p.vy += ny * force;
      }
    }

    // 阻尼
    p.vx *= DAMP;
    p.vy *= DAMP;

    // 更新位置
    p.x += p.vx;
    p.y += p.vy;

    // 约束在画面边缘
    const margin = p.size;
    if (p.x < margin) p.x = margin;
    if (p.x > W - margin) p.x = W - margin;
    if (p.y < margin) p.y = margin;
    if (p.y > H - margin) p.y = H - margin;
  }
}

// ---------- 渲染 ----------
function draw() {
  ctx.clearRect(0, 0, W, H);

  // 微光
  const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.7);
  grad.addColorStop(0, 'rgba(163,230,53,0.015)');
  grad.addColorStop(1, 'rgba(10,10,15,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // 画粒子连线（近距离粒子之间）
  for (const p of particles) {
    ctx.fillStyle = p.color;
    ctx.shadowColor = 'rgba(163,230,53,0.1)';
    ctx.shadowBlur = 4;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size / 2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.shadowBlur = 0;
}

// ---------- 动画循环 ----------
function animate() {
  updateParticles();
  draw();
  requestAnimationFrame(animate);
}

// ---------- Resize ----------
window.addEventListener('resize', () => {
  resize();
  // 重建粒子时考虑当前偏移
  const offsetX = portraitCenterX - W/2;
  const offsetY = portraitCenterY - H/2;
  setPortraitTargets();
  portraitCenterX = W/2 + offsetX;
  portraitCenterY = H/2 + offsetY;
  // 保留旧的相对位置重建
  const oldParticles = particles;
  particles = buildPortrait(W/2, H/2);
  for (let i = 0; i < particles.length && i < oldParticles.length; i++) {
    particles[i].x = oldParticles[i].x;
    particles[i].y = oldParticles[i].y;
    particles[i].vx = oldParticles[i].vx;
    particles[i].vy = oldParticles[i].vy;
  }
});

// ---------- 启动顺序 ----------
animate();

setTimeout(() => {
  document.getElementById('introOverlay').classList.add('hidden');

  // 遮罩消失后：表单显现 + 粒子画像移向右侧
  setTimeout(() => {
    document.getElementById('authContainer').classList.add('visible');
    document.getElementById('portraitLabel').classList.add('visible');

    // 粒子画从中心迁移到右侧
    const startX = W / 2;
    const endX = W - 140;
    const startTime = performance.now();
    const duration = 1400;

    function moveStep(now) {
      const t = Math.min((now - startTime) / duration, 1);
      const ease = 1 - Math.pow(1 - t, 3);
      const currentCX = startX + (endX - startX) * ease;

      for (const p of particles) {
        const relX = p.ox - startX;
        p.ox = currentCX + relX;
      }
      portraitCenterX = currentCX;

      if (t < 1) requestAnimationFrame(moveStep);
    }
    requestAnimationFrame(moveStep);

    // 粒子爆发效果
    let burstCount = 0;
    const bi = setInterval(() => {
      if (burstCount++ > 30) { clearInterval(bi); return; }
      for (const p of particles) {
        if (Math.random() < 0.06) {
          p.vx += (Math.random() - 0.5) * 8;
          p.vy += (Math.random() - 0.5) * 8;
        }
      }
    }, 30);
  }, 100);
}, 1200);

// 表单切换
document.querySelectorAll('.auth-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
  });
});
</script>
</body>
</html>
