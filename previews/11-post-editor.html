<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方案十一：Post Editor · 编辑器</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0f;color:#e4e4ec;min-height:100vh;line-height:1.7;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -20%,rgba(163,230,53,0.04),transparent);pointer-events:none;z-index:0;}
.preview-badge{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.04);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.06);padding:8px 24px;border-radius:20px;font-size:11px;letter-spacing:0.6px;color:rgba(255,255,255,0.3);z-index:100;font-weight:400;}
.navbar{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,10,15,0.75);backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,0.04);padding:0 32px;height:64px;display:flex;align-items:center;}
.nav-inner{max-width:800px;width:100%;margin:0 auto;display:flex;align-items:center;}
.nav-brand{font-size:16px;font-weight:600;background:linear-gradient(135deg,#e4e4ec,#a3e635);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.nav-links{margin-left:auto;display:flex;align-items:center;gap:6px;}
.nav-user{display:flex;align-items:center;gap:10px;padding:4px 16px 4px 4px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.04);border-radius:12px;font-size:13px;font-weight:500;}
.nav-user .avatar{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#a3e635,#65a30d);color:#0a0a0f;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}

/* ===== Editor ===== */
.page{max-width:800px;margin:84px auto 0;padding:0 32px 100px;position:relative;z-index:1;}
.editor-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;padding-top:20px;}
.editor-header h1{font-size:22px;font-weight:700;}

/* ===== Editor Card ===== */
.editor-card{background:linear-gradient(135deg,rgba(23,23,23,0.9),rgba(41,37,36,0.85));border:1px solid rgba(255,255,255,0.04);border-radius:20px;padding:32px;transition:border-color 0.3s;}
.editor-card:hover{border-color:rgba(163,230,53,0.06);}
.form-group{margin-bottom:20px;}
.form-label{display:block;font-size:12px;font-weight:600;color:rgba(255,255,255,0.35);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.3px;}
.form-input,.form-select{width:100%;padding:12px 16px;border:1px solid rgba(255,255,255,0.06);border-radius:12px;background:rgba(0,0,0,0.3);color:#e4e4ec;font-size:14px;outline:none;transition:all 0.2s;}
.form-input:focus,.form-select:focus{border-color:rgba(163,230,53,0.15);box-shadow:0 0 0 3px rgba(163,230,53,0.04);}
.form-input::placeholder{color:rgba(255,255,255,0.15);}
.form-select{cursor:pointer;}
.form-select option{background:#1a1a1f;color:#e4e4ec;}
.form-textarea{width:100%;padding:14px 16px;border:1px solid rgba(255,255,255,0.06);border-radius:12px;background:rgba(0,0,0,0.3);color:#e4e4ec;font-size:14px;outline:none;resize:vertical;min-height:100px;transition:border-color 0.2s;font-family:inherit;}
.form-textarea:focus{border-color:rgba(163,230,53,0.15);}

/* ===== Block ===== */
.block-item{background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.04);border-radius:12px;padding:20px;margin-bottom:12px;transition:border-color 0.2s;}
.block-item:hover{border-color:rgba(163,230,53,0.06);}
.block-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.block-type-badge{font-size:11px;padding:4px 12px;border-radius:6px;font-weight:600;}
.block-type-badge.text{background:rgba(59,130,246,0.1);color:#93c5fd;}
.block-type-badge.code{background:rgba(163,230,53,0.1);color:#a3e635;}
.block-remove{width:28px;height:28px;border-radius:6px;border:1px solid rgba(239,68,68,0.15);background:transparent;color:rgba(239,68,68,0.5);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.block-remove:hover{background:rgba(239,68,68,0.1);color:#ef4444;}

/* ===== Add Block ===== */
.add-block-bar{display:flex;gap:8px;margin:16px 0 24px;}
.add-block-btn{padding:8px 18px;border-radius:10px;border:1px solid rgba(255,255,255,0.06);background:transparent;color:rgba(255,255,255,0.35);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.2s;}
.add-block-btn:hover{border-color:rgba(163,230,53,0.08);color:#a3e635;background:rgba(163,230,53,0.04);}

/* ===== Actions ===== */
.editor-actions{display:flex;gap:10px;margin-top:28px;padding-top:24px;border-top:1px solid rgba(255,255,255,0.04);}
.btn{display:inline-flex;align-items:center;gap:6px;padding:12px 28px;border-radius:12px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.25s;border:none;}
.btn-primary{background:linear-gradient(135deg,#a3e635,#65a30d);color:#0a0a0f;box-shadow:0 4px 20px rgba(163,230,53,0.08);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 28px rgba(163,230,53,0.12);}
.btn-outline{background:transparent;border:1px solid rgba(255,255,255,0.06);color:rgba(255,255,255,0.5);}
.btn-outline:hover{border-color:rgba(163,230,53,0.08);color:#a3e635;}
.btn-danger{background:rgba(239,68,68,0.1);color:#ef4444;border:1px solid rgba(239,68,68,0.15);}
.btn-danger:hover{background:rgba(239,68,68,0.15);}

/* ===== Tag Input ===== */
.tag-input-wrap{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.tag-preview{display:flex;gap:6px;flex-wrap:wrap;}
.tag-item{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:8px;background:rgba(163,230,53,0.06);border:1px solid rgba(163,230,53,0.08);color:#a3e635;font-size:12px;}
.tag-remove{width:16px;height:16px;border-radius:50%;border:none;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.3);font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.tag-remove:hover{background:rgba(239,68,68,0.3);color:#fff;}

/* ===== File Upload ===== */
.file-upload-zone{display:flex;align-items:center;gap:12px;padding:14px;border:1px dashed rgba(255,255,255,0.06);border-radius:12px;background:rgba(0,0,0,0.15);cursor:pointer;transition:all 0.2s;}
.file-upload-zone:hover{border-color:rgba(163,230,53,0.12);background:rgba(163,230,53,0.02);}
.file-upload-icon{font-size:24px;}
.file-upload-text{font-size:13px;color:rgba(255,255,255,0.3);}
.file-upload-hint{font-size:11px;color:rgba(255,255,255,0.15);}

/* ===== Attachment ===== */
.attach-settings{margin-top:12px;padding:12px;background:rgba(0,0,0,0.15);border-radius:10px;}
.attach-row{display:flex;gap:12px;flex-wrap:wrap;}
.attach-field{flex:1;min-width:140px;}
.attach-field label{display:block;font-size:11px;color:rgba(255,255,255,0.3);margin-bottom:4px;}
.attach-field input{width:100%;padding:8px 12px;border:1px solid rgba(255,255,255,0.06);border-radius:8px;background:rgba(0,0,0,0.2);color:#e4e4ec;font-size:12px;outline:none;}
.attach-field input:focus{border-color:rgba(163,230,53,0.12);}
</style>
</head>
<body>
<div class="preview-badge">✦ 编辑器 · 发布/编辑帖子</div>
<nav class="navbar"><div class="nav-inner"><div class="nav-brand">Portfolio</div><div class="nav-links"><span class="nav-user"><span class="avatar">A</span><span>admin</span></span></div></div></nav>

<div class="page">
  <div class="editor-header">
    <h1>✏️ 发布作品</h1>
  </div>

  <div class="editor-card">
    <div class="form-group">
      <label class="form-label">标题</label>
      <input class="form-input" type="text" placeholder="输入作品标题..." value="品牌视觉识别系统设计">
    </div>

    <div class="form-group">
      <label class="form-label">分类</label>
      <select class="form-select">
        <option>📂 作品区</option>
        <option>💬 聊天区</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">简介</label>
      <textarea class="form-textarea" placeholder="简短的描述..." style="min-height:60px;">从策略定位到视觉落地的全链路品牌设计，以简洁专业为核心理念。</textarea>
    </div>

    <div class="form-group">
      <label class="form-label">标签</label>
      <div class="tag-input-wrap">
        <input class="form-input" type="text" placeholder="输入标签名添加..." style="flex:1;">
        <button class="btn btn-outline" style="padding:10px 20px;">添加</button>
      </div>
      <div class="tag-preview" style="margin-top:10px;">
        <span class="tag-item">设计 <button class="tag-remove">×</button></span>
        <span class="tag-item">品牌 <button class="tag-remove">×</button></span>
        <span class="tag-item">VI <button class="tag-remove">×</button></span>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">封面图片</label>
      <div class="file-upload-zone">
        <span class="file-upload-icon">🖼</span>
        <div><div class="file-upload-text">点击上传封面图片</div><div class="file-upload-hint">支持 JPG, PNG, WebP，建议比例 2.5:1</div></div>
      </div>
    </div>

    <div style="margin-bottom:20px;">
      <label class="form-label" style="margin-bottom:14px;">内容块</label>

      <div class="block-item">
        <div class="block-header">
          <span class="block-type-badge text">📝 文本</span>
          <button class="block-remove">×</button>
        </div>
        <textarea class="form-textarea" placeholder="输入文本内容..." style="min-height:80px;">本次设计以「简洁 · 专业 · 记忆点」为核心关键词。在色彩选择上，采用深色基底搭配 lime 绿强调色，营造沉浸式浏览体验。</textarea>
      </div>

      <div class="block-item">
        <div class="block-header">
          <span class="block-type-badge code">💻 代码</span>
          <button class="block-remove">×</button>
        </div>
        <textarea class="form-textarea" placeholder="粘贴代码..." style="min-height:100px;font-family:'JetBrains Mono',monospace;font-size:13px;">const theme = { primary: '#a3e635', accent: '#65a30d' };</textarea>
      </div>

      <div class="block-item">
        <div class="block-header">
          <span class="block-type-badge text">📎 附件（可设置积分/等级权限）</span>
          <button class="block-remove">×</button>
        </div>
        <div class="file-upload-zone" style="margin-bottom:10px;">
          <span class="file-upload-icon">📎</span>
          <div><div class="file-upload-text">点击上传附件文件</div><div class="file-upload-hint">max 50 MB</div></div>
        </div>
        <div class="attach-settings">
          <div class="attach-row">
            <div class="attach-field"><label>最低等级</label><input type="number" value="1" placeholder="0=不限"></div>
            <div class="attach-field"><label>解鎖积分</label><input type="number" value="0" placeholder="0=免费"></div>
            <div class="attach-field"><label>下载积分</label><input type="number" value="0" placeholder="0=免费"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="add-block-bar">
      <button class="add-block-btn">+ 📝 文本块</button>
      <button class="add-block-btn">+ 💻 代码块</button>
      <button class="add-block-btn">+ 🖼 图片</button>
      <button class="add-block-btn">+ 📎 附件</button>
    </div>

    <div class="editor-actions">
      <button class="btn btn-primary">📤 发布</button>
      <button class="btn btn-outline">💾 保存草稿</button>
      <button class="btn btn-danger" style="margin-left:auto;">🗑 删除</button>
    </div>
  </div>
</div>
</body>
</html>
