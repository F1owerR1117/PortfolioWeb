<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方案十五：Notifications · 通知</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0f;color:#e4e4ec;min-height:100vh;line-height:1.7;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -20%,rgba(163,230,53,0.04),transparent);pointer-events:none;z-index:0;}
.preview-badge{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.04);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.06);padding:8px 24px;border-radius:20px;font-size:11px;letter-spacing:0.6px;color:rgba(255,255,255,0.3);z-index:100;font-weight:400;}

.navbar{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,10,15,0.75);backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,0.04);padding:0 32px;height:64px;display:flex;align-items:center;}
.nav-inner{max-width:700px;width:100%;margin:0 auto;display:flex;align-items:center;}
.nav-brand{font-size:16px;font-weight:600;background:linear-gradient(135deg,#e4e4ec,#a3e635);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.nav-links{margin-left:auto;display:flex;align-items:center;gap:6px;}
.nav-user{display:flex;align-items:center;gap:10px;padding:4px 16px 4px 4px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.04);border-radius:12px;font-size:13px;font-weight:500;}
.nav-user .avatar{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#a3e635,#65a30d);color:#0a0a0f;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}

.page{max-width:700px;margin:84px auto 0;padding:0 32px 100px;position:relative;z-index:1;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-top:20px;}
.page-header h1{font-size:22px;font-weight:700;display:flex;align-items:center;gap:10px;}
.notif-count{font-size:12px;background:rgba(163,230,53,0.08);color:#a3e635;padding:2px 12px;border-radius:10px;font-weight:600;}

.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:10px;font-size:12px;font-weight:500;cursor:pointer;transition:all 0.2s;border:none;}
.btn-outline{border:1px solid rgba(255,255,255,0.06);background:transparent;color:rgba(255,255,255,0.4);}
.btn-outline:hover{border-color:rgba(163,230,53,0.08);color:#a3e635;}

/* ===== Notification List ===== */
.notif-list{display:flex;flex-direction:column;gap:1px;background:rgba(255,255,255,0.02);border-radius:16px;overflow:hidden;}
.notif-item{display:flex;gap:14px;padding:18px 20px;background:rgba(0,0,0,0.2);cursor:pointer;transition:all 0.2s;border-left:3px solid transparent;}
.notif-item:hover{background:rgba(163,230,53,0.02);}
.notif-item.unread{border-left-color:#a3e635;}
.notif-item.unread .notif-body::after{content:'';display:inline-block;width:8px;height:8px;border-radius:50%;background:#a3e635;flex-shrink:0;margin-left:8px;}
.notif-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;background:rgba(163,230,53,0.04);border:1px solid rgba(163,230,53,0.04);}
.notif-body{flex:1;min-width:0;}
.notif-text{font-size:13px;color:rgba(255,255,255,0.55);line-height:1.6;}
.notif-text strong{color:#e4e4ec;font-weight:600;}
.notif-text .highlight{color:#a3e635;}
.notif-time{margin-top:6px;font-size:11px;color:rgba(255,255,255,0.2);display:flex;align-items:center;gap:8px;}
.notif-action{background:none;border:none;color:rgba(255,255,255,0.2);font-size:16px;cursor:pointer;padding:4px;border-radius:6px;height:fit-content;transition:all 0.2s;opacity:0;}
.notif-item:hover .notif-action{opacity:1;}
.notif-action:hover{background:rgba(239,68,68,0.1);color:#ef4444;}

/* ===== Empty ===== */
.empty{text-align:center;padding:80px 20px;}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:0.3;}
.empty-text{font-size:14px;color:rgba(255,255,255,0.2);}

/* ===== Divider ===== */
.section-title{font-size:12px;font-weight:600;color:rgba(255,255,255,0.2);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;margin-top:28px;}
.section-title:first-child{margin-top:0;}
</style>
</head>
<body>
<div class="preview-badge">✦ 通知中心</div>
<nav class="navbar"><div class="nav-inner"><div class="nav-brand">Portfolio</div><div class="nav-links"><span class="nav-user"><span class="avatar">A</span><span>admin</span></span></div></div></nav>

<div class="page">
  <div class="page-header">
    <h1>🔔 通知 <span class="notif-count">5</span></h1>
    <button class="btn btn-outline">全部已读</button>
  </div>

  <div class="section-title">未读通知</div>

  <div class="notif-list">
    <div class="notif-item unread">
      <span class="notif-icon">❤️</span>
      <div class="notif-body">
        <div class="notif-text"><strong>Wesley</strong> 赞了你的作品 <span class="highlight">「品牌视觉识别系统设计」</span></div>
        <div class="notif-time">2 分钟前</div>
      </div>
      <button class="notif-action">×</button>
    </div>
    <div class="notif-item unread">
      <span class="notif-icon">💬</span>
      <div class="notif-body">
        <div class="notif-text"><strong>Jane</strong> 评论了你的作品：<span class="highlight">「色彩搭配非常高级！」</span></div>
        <div class="notif-time">15 分钟前</div>
      </div>
      <button class="notif-action">×</button>
    </div>
    <div class="notif-item unread">
      <span class="notif-icon">👤</span>
      <div class="notif-body">
        <div class="notif-text"><strong>Tom</strong> 申请添加你为好友</div>
        <div class="notif-time">1 小时前</div>
      </div>
      <button class="notif-action">×</button>
    </div>
  </div>

  <div class="section-title">已读通知</div>

  <div class="notif-list">
    <div class="notif-item">
      <span class="notif-icon">⭐</span>
      <div class="notif-body">
        <div class="notif-text">你的作品 <span class="highlight">「React 组件库设计」</span> 被管理员加为精华帖</div>
        <div class="notif-time">昨天</div>
      </div>
      <button class="notif-action">×</button>
    </div>
    <div class="notif-item">
      <span class="notif-icon">📢</span>
      <div class="notif-body">
        <div class="notif-text">系统通知：平台将于本周六 02:00-04:00 进行维护升级</div>
        <div class="notif-time">3 天前</div>
      </div>
      <button class="notif-action">×</button>
    </div>
    <div class="notif-item">
      <span class="notif-icon">🏆</span>
      <div class="notif-body">
        <div class="notif-text">恭喜！你已达到 <span class="highlight">Lv.12 星辰</span> 等级，继续加油！</div>
        <div class="notif-time">1 周前</div>
      </div>
      <button class="notif-action">×</button>
    </div>
  </div>
</div>
</body>
</html>
