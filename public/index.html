<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人作品集</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
</head>
<body>
  <!-- Navigation -->
  <nav id="navbar" class="navbar">
    <div class="nav-inner">
      <div class="nav-brand"></div>
    </div>
    <div class="nav-links" id="nav-links">
      <!-- dynamically rendered -->
    </div>
  </nav>

  <!-- Main Content -->
  <main id="app" class="container">
    <!-- Views rendered by JS -->
    <div class="loading-screen" id="loading-screen">
      <div class="spinner"></div>
      <p>加载中...</p>
    </div>
  </main>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-left">
        <label class="mute-toggle" title="点击音效静音">
          <input type="checkbox" id="mute-checkbox">
          <span class="mute-label">静音</span>
        </label>
      </div>
      <div class="footer-center" id="music-player-container" style="display:none;">
        <!-- Music player rendered by MusicPlayer module; shown when logged in -->
      </div>
      <div class="footer-right">
        <span class="footer-text">个人作品集 &copy; 2024</span>
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/music.js"></script>
  <script src="/js/components/shared.js"></script>
  <script src="/js/components/auth.js"></script>
  <script src="/js/components/postList.js"></script>
  <script src="/js/components/postDetail.js"></script>
  <script src="/js/components/postEditor.js"></script>
  <script src="/js/components/profile.js"></script>
  <script src="/js/components/notifications.js"></script>
  <script src="/js/components/bookmarks.js"></script>
  <script src="/js/components/musicLibrary.js"></script>
  <script src="/js/components/friends.js"></script>
  <script src="/js/components/chat.js"></script>
  <script src="/js/components/admin.js"></script>
  <script src="/js/components/ads.js"></script>
  <script src="/js/components/index.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
